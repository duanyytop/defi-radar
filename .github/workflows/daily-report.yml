name: Daily DeFi Report

on:
  schedule:
    # 8:00 AM Beijing time (UTC+8) = 0:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate reports
        run: node dist/main.js 2> logs.txt || true

      - name: Show debug logs
        if: always()
        run: |
          echo "=== Logs ==="
          cat logs.txt || true
          echo ""
          echo "=== EN preview ==="
          head -30 report-en.md || true
          echo ""
          echo "=== ZH preview ==="
          head -30 report-zh.md || true

      - name: Create English issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "DeFi Daily Report — ${DATE}" \
            --body-file report-en.md \
            --label "daily-report"

      - name: Create Chinese issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "DeFi 每日报告 — ${DATE}" \
            --body-file report-zh.md \
            --label "daily-report"
